<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Spraakhelper</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:wght@500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f5f0e8;
  --surface: #fffdf8;
  --card: #ffffff;
  --accent: #2d6a4f;
  --accent-light: #52b788;
  --accent-pale: #d8f3dc;
  --warm: #e76f51;
  --warm-pale: #fde8e2;
  --blue: #457b9d;
  --blue-pale: #dbeafe;
  --purple: #6d4c9f;
  --purple-pale: #ede9fe;
  --amber: #d97706;
  --amber-pale: #fef3c7;
  --text: #1a1a2e;
  --text-muted: #6b705c;
  --border: #e0d9cc;
  --shadow: rgba(45,106,79,0.10);
  --radius: 20px;
  --radius-sm: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* HEADER */
header {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 12px var(--shadow);
}
.logo {
  font-family: 'Lora', serif;
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--accent);
  flex-shrink: 0;
}
.logo span { color: var(--warm); }

/* BREADCRUMB */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  flex-wrap: wrap;
  min-width: 0;
}
.crumb {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  padding: 4px 10px;
  border-radius: 50px;
  transition: all 0.15s;
}
.crumb:hover { background: var(--accent-pale); color: var(--accent); }
.crumb.active { color: var(--accent); }
.crumb-sep { color: var(--border); font-size: 1.1rem; }

/* SPEECH AREA */
.speech-area {
  margin: 16px 16px 0;
  background: var(--card);
  border-radius: var(--radius);
  border: 2px solid var(--border);
  padding: 16px 20px;
  min-height: 80px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 4px 20px var(--shadow);
  transition: all 0.3s ease;
}
.speech-area.has-text { border-color: var(--accent-light); background: var(--accent-pale); }
.speech-text {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text);
  flex: 1;
  line-height: 1.4;
}
.speech-text.placeholder { color: var(--text-muted); font-weight: 400; font-size: 1.1rem; font-style: italic; }
.speech-actions { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
.speak-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 50%;
  width: 58px;
  height: 58px;
  font-size: 1.6rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  box-shadow: 0 4px 12px rgba(45,106,79,0.3);
}
.speak-btn:active { transform: scale(0.92); }
.speak-btn:disabled { background: #bbb; box-shadow: none; }
@keyframes pulse-ring {
  0% { box-shadow: 0 0 0 0 rgba(45,106,79,0.45); }
  70% { box-shadow: 0 0 0 14px rgba(45,106,79,0); }
  100% { box-shadow: 0 0 0 0 rgba(45,106,79,0); }
}
.speak-btn.speaking { animation: pulse-ring 1s ease-out infinite; background: var(--accent-light); }
.clear-btn {
  background: var(--warm-pale);
  color: var(--warm);
  border: 2px solid var(--warm);
  border-radius: var(--radius-sm);
  padding: 9px 16px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.15s;
}
.clear-btn:active { transform: scale(0.95); }

/* FAVORITES */
.fav-bar { padding: 12px 16px 4px; }
.section-label {
  font-size: 0.75rem;
  font-weight: 800;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  margin-bottom: 8px;
}
.fav-chips { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.fav-chips::-webkit-scrollbar { display: none; }
.fav-chip {
  background: var(--warm-pale);
  border: 2px solid var(--warm);
  border-radius: 50px;
  padding: 8px 16px;
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--warm);
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.fav-chip:active { background: var(--warm); color: white; transform: scale(0.95); }

/* GRID */
.grid-wrap { padding: 10px 16px 30px; flex: 1; }
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.grid.two-col { grid-template-columns: repeat(2, 1fr); }

.card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 10px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 2px 8px var(--shadow);
  min-height: 110px;
  text-align: center;
  user-select: none;
  position: relative;
}
.card:active { transform: scale(0.93); }
.card.selected { border-color: var(--accent); background: var(--accent-pale); }
.card[data-theme="green"]:active, .card[data-theme="green"].selected { border-color: var(--accent); background: var(--accent-pale); }
.card[data-theme="blue"]:active, .card[data-theme="blue"].selected { border-color: var(--blue); background: var(--blue-pale); }
.card[data-theme="purple"]:active, .card[data-theme="purple"].selected { border-color: var(--purple); background: var(--purple-pale); }
.card[data-theme="amber"]:active, .card[data-theme="amber"].selected { border-color: var(--amber); background: var(--amber-pale); }
.card[data-theme="warm"]:active, .card[data-theme="warm"].selected { border-color: var(--warm); background: var(--warm-pale); }
.card-emoji { font-size: 2.2rem; line-height: 1; }
.card-label { font-size: 0.9rem; font-weight: 700; color: var(--text); line-height: 1.3; }
.card-sub { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
.has-children::after {
  content: '›';
  position: absolute;
  bottom: 8px;
  right: 12px;
  font-size: 1.1rem;
  color: var(--text-muted);
  font-weight: 900;
}

/* BACK BUTTON */
.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 50px;
  padding: 10px 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  color: var(--text-muted);
  cursor: pointer;
  margin: 12px 16px 0;
  width: fit-content;
  transition: all 0.15s;
}
.back-btn:active { transform: scale(0.96); background: var(--bg); }

/* LOADING / ERROR STATES */
.status-msg {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 1.1rem;
  font-weight: 600;
}

@media (max-width: 480px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<header>
  <div class="logo">Spraak<span>helper</span></div>
  <div class="breadcrumb" id="breadcrumb"></div>
</header>

<div class="speech-area" id="speechArea">
  <div class="speech-text placeholder" id="speechText">Tik een onderwerp...</div>
  <div class="speech-actions">
    <button class="clear-btn" id="clearBtn" onclick="clearSpeech()" style="display:none">✕ Wis</button>
    <button class="speak-btn" id="speakBtn" onclick="speakText()" disabled>🔊</button>
  </div>
</div>

<div class="fav-bar">
  <div class="section-label">⭐ Snel</div>
  <div class="fav-chips" id="favChips"></div>
</div>

<div id="backWrap"></div>
<div class="grid-wrap"><div class="grid" id="grid"></div></div>

<!-- Load data tree first, then app logic -->
<script src="Data/data-tree.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// SUPABASE CONFIG
// Replace these two values with your own from supabase.com
// Project Settings → API → Project URL & anon/public key
// ═══════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://absdasswruhhtaguenfz.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFic2Rhc3N3cnVoaHRhZ3VlbmZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTkzODgsImV4cCI6MjA5MDQzNTM4OH0.Tgk9KJ6KMSe5fRCV3YwBVCs7pOekNEDc1MVebFFAEP8';
const SUPABASE_TABLE = 'tap_logs';

// ── Session ID: one random ID per page-load (groups a session together)
const SESSION_ID = Math.random().toString(36).slice(2, 10);

// ── Tap timer: track how long since last tap (search effort proxy)
let lastTapTime = Date.now();

// ── Log a tap event to Supabase (fire-and-forget, never blocks UI)
async function logTap(eventType, item, pathLabels, source = 'grid') {
  const now = Date.now();
  const timeSinceLastTap = now - lastTapTime;
  lastTapTime = now;

  // Fetch IP address
  let ip = null;
  try {
    const ipResponse = await fetch('https://api.ipify.org?format=json');
    const ipData = await ipResponse.json();
    ip = ipData.ip;
  } catch (err) {
    console.warn('[IP fetch failed]', err);
  }

  const payload = {
    timestamp:          new Date().toISOString(),
    session_id:         SESSION_ID,
    event_type:         eventType,              // 'phrase_selected' | 'category_opened' | 'favorite_selected' | 'back' | 'clear'
    path:               pathLabels.join(' > '), // e.g. "Eten & drinken > Avondeten > Vlees"
    item_label:         item?.label  ?? null,
    item_text:          item?.say    ?? null,
    has_children:       item?.children ? true : false,
    time_since_last_tap_ms: timeSinceLastTap,
    ip_address:         ip,
  };

  try {
    await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}`, {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'apikey':        SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer':        'return=minimal',      // faster: no response body needed
      },
      body: JSON.stringify(payload),
    });
  } catch (err) {
    // Silent fail — never interrupt the user experience for a logging error
    console.warn('[Supabase log failed]', err);
  }
}

// ═══════════════════════════════════════════════════════
// FAVORITES
// ═══════════════════════════════════════════════════════
const FAVORITES = [
  { label: 'Ja',           say: 'Ja.' },
  { label: 'Nee',          say: 'Nee.' },
  { label: 'Dankjewel',    say: 'Dankjewel, dat stel ik erg op prijs.' },
  { label: 'Ik ben moe',   say: 'Ik ben moe.' },
  { label: 'Koffie graag', say: 'Ik wil graag een kop koffie.' },
  { label: 'Wacht even',   say: 'Wacht even, alsjeblieft.' },
];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let navPath      = [];   // stack: each entry = { items, label, theme }
let currentItems = [];
let currentTheme = 'green';
let currentText  = '';
let selectedCard = null;
const synth      = window.speechSynthesis;

// ═══════════════════════════════════════════════════════
// BOOT — wait for data-tree.js to set window.treeLoaded
// ═══════════════════════════════════════════════════════
function boot() {
  if (!window.treeLoaded || !window.tree) {
    document.getElementById('grid').innerHTML =
      '<div class="status-msg">⚠️ Data/data-tree.js kon niet worden geladen.</div>';
    return;
  }
  renderFavs();
  renderBreadcrumb();
  renderGrid(window.tree, null);
}

// ═══════════════════════════════════════════════════════
// FAVORITES
// ═══════════════════════════════════════════════════════
function renderFavs() {
  const c = document.getElementById('favChips');
  c.innerHTML = '';
  FAVORITES.forEach(fav => {
    const el = document.createElement('div');
    el.className = 'fav-chip';
    el.textContent = fav.label;
    el.onclick = () => {
      logTap('favorite_selected', fav, ['Favorieten'], 'favorite');
      setSpeech(fav.say);
    };
    c.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════
function pathLabels() {
  return navPath.map(p => p.label);
}

function navigate(item) {
  if (item.say) {
    // Leaf node — speak it
    logTap('phrase_selected', item, [...pathLabels(), item.label], 'grid');
    setSpeech(item.say);
    return;
  }
  if (item.children) {
    logTap('category_opened', item, [...pathLabels(), item.label], 'grid');
    navPath.push({ items: currentItems, label: item.label, theme: currentTheme });
    currentTheme = item.theme || currentTheme;
    renderBreadcrumb();
    renderGrid(item.children, currentTheme);
  }
}

function goBack() {
  if (navPath.length === 0) return;
  logTap('back', null, pathLabels(), 'navigation');
  const prev = navPath.pop();
  currentTheme = navPath.length > 0 ? (navPath[navPath.length - 1].theme || 'green') : 'green';
  renderBreadcrumb();
  renderGrid(prev.items, currentTheme);
}

function goTo(index) {
  // Breadcrumb jump — trim path to `index` entries
  while (navPath.length > index) navPath.pop();
  if (navPath.length === 0) {
    currentTheme = 'green';
    renderBreadcrumb();
    renderGrid(window.tree, null);
  } else {
    // Re-derive the items at the target depth
    let items = window.tree;
    for (let i = 0; i < navPath.length; i++) {
      const match = items.find(it => it.label === navPath[i].label && it.children);
      if (match) items = match.children;
    }
    currentTheme = navPath[navPath.length - 1].theme || 'green';
    renderBreadcrumb();
    renderGrid(items, currentTheme);
  }
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';

  const home = document.createElement('span');
  home.className = 'crumb';
  home.textContent = '🏠 Thuis';
  home.onclick = () => {
    logTap('back', null, pathLabels(), 'breadcrumb');
    navPath = [];
    renderBreadcrumb();
    renderGrid(window.tree, null);
  };
  bc.appendChild(home);

  navPath.forEach((p, i) => {
    const sep = document.createElement('span');
    sep.className = 'crumb-sep';
    sep.textContent = '›';
    bc.appendChild(sep);

    const crumb = document.createElement('span');
    crumb.className = 'crumb' + (i === navPath.length - 1 ? ' active' : '');
    crumb.textContent = p.label;
    crumb.onclick = () => { goTo(i + 1); };
    bc.appendChild(crumb);
  });
}

function renderGrid(items, theme) {
  currentItems = items;
  selectedCard = null;

  const backWrap = document.getElementById('backWrap');
  backWrap.innerHTML = navPath.length > 0
    ? '<button class="back-btn" onclick="goBack()">‹ Terug</button>'
    : '';

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.className = 'grid' + (navPath.length === 0 ? ' two-col' : '');

  items.forEach(item => {
    const card = document.createElement('div');
    const t = item.theme || theme || 'green';
    card.className = 'card' + (item.children ? ' has-children' : '');
    card.dataset.theme = t;
    card.innerHTML = `
      <div class="card-emoji">${item.emoji || ''}</div>
      <div class="card-label">${item.label}</div>
      ${item.children ? `<div class="card-sub">${item.children.length} opties</div>` : ''}
    `;
    card.onclick = () => {
      if (item.say) {
        if (selectedCard) selectedCard.classList.remove('selected');
        selectedCard = card;
        card.classList.add('selected');
      }
      navigate(item);
    };
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════
// SPEECH OUTPUT
// ═══════════════════════════════════════════════════════
function setSpeech(text) {
  currentText = text;
  const el = document.getElementById('speechText');
  el.textContent = text;
  el.classList.remove('placeholder');
  document.getElementById('speechArea').classList.add('has-text');
  document.getElementById('speakBtn').disabled = false;
  document.getElementById('clearBtn').style.display = 'inline-flex';
  speakText();
}

function clearSpeech() {
  logTap('clear', null, pathLabels(), 'speech_area');
  currentText = '';
  if (selectedCard) { selectedCard.classList.remove('selected'); selectedCard = null; }
  const el = document.getElementById('speechText');
  el.textContent = 'Tik een onderwerp...';
  el.classList.add('placeholder');
  document.getElementById('speechArea').classList.remove('has-text');
  document.getElementById('speakBtn').disabled = true;
  document.getElementById('clearBtn').style.display = 'none';
  synth.cancel();
}

function speakText() {
  if (!currentText) return;
  synth.cancel();
  const btn = document.getElementById('speakBtn');
  btn.classList.add('speaking');
  const utt = new SpeechSynthesisUtterance(currentText);
  utt.lang  = 'nl-NL';
  utt.rate  = 0.88;
  utt.pitch = 0.95;
  const voices = synth.getVoices();
  const dutch  = voices.find(v => v.lang.startsWith('nl'));
  if (dutch) utt.voice = dutch;
  utt.onend  = () => btn.classList.remove('speaking');
  utt.onerror = () => btn.classList.remove('speaking');
  synth.speak(utt);
}

if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = () => {};

// ═══════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════
boot();
</script>
</body>
</html>
